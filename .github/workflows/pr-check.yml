name: PR Checks

on:
  pull_request:
    branches: [main, dev, test]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  terraform-checks:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: |
          terraform fmt -check -recursive infrastructure/terraform/bootstrap infrastructure/terraform/envs infrastructure/terraform/modules
          terraform fmt -check -recursive infrastructure/terraform/IAM

      - name: Validate bootstrap Terraform root
        run: |
          terraform -chdir=infrastructure/terraform/bootstrap init -backend=false -input=false
          terraform -chdir=infrastructure/terraform/bootstrap validate

      - name: Validate environment Terraform roots
        run: |
          for env in test staging prod; do
            terraform -chdir="infrastructure/terraform/envs/${env}" init -backend=false -input=false
            terraform -chdir="infrastructure/terraform/envs/${env}" validate
          done

      - name: Validate IAM Terraform root
        run: |
          terraform -chdir=infrastructure/terraform/IAM init -backend=false -input=false
          terraform -chdir=infrastructure/terraform/IAM validate

  frontend-checks:
    name: Frontend Regressions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run Docker-backed frontend regression suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from frontend-regression-test frontend-regression-test

      - name: Tear down frontend regression stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  backend-regressions:
    name: Backend Regressions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run Docker-backed backend regression suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend-regression-test backend-regression-test

      - name: Tear down regression stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  backend-integration:
    name: Backend Integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run Docker-backed backend integration suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend-test backend-test

      - name: Tear down integration stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t spendrax-backend:test ./backend

      - name: Build frontend image
        run: docker build -t spendrax-frontend:test ./frontend
