name: CI/CD Pipeline

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip tests (emergency use only)
        required: false
        default: "false"
        type: boolean
      deploy_application:
        description: Build images and deploy the application to ECS
        required: false
        default: "true"
        type: boolean
      target_environment:
        description: Target environment for manual deployment
        required: true
        default: test
        type: choice
        options:
          - test
          - staging
          - prod

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  TERRAFORM_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || vars.TERRAFORM_ENV || (github.ref_name == 'test' && 'test' || github.ref_name == 'staging' && 'staging' || 'prod') }}
  TF_WORKING_DIR: infrastructure/terraform/envs/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || vars.TERRAFORM_ENV || (github.ref_name == 'test' && 'test' || github.ref_name == 'staging' && 'staging' || 'prod') }}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.filter.outputs.infrastructure }}
      app_changed: ${{ steps.filter.outputs.application }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect infrastructure and application changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infrastructure:
              - 'infrastructure/**'
              - '.github/workflows/deploy.yml'
            application:
              - 'backend/**'
              - 'frontend/**'

  frontend-checks:
    name: Frontend Regressions
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Docker-backed frontend regression suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from frontend-regression-test frontend-regression-test

      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: reports/frontend-report.xml
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          if [ -f reports/frontend-report.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/frontend-report.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/frontend-report.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/frontend-report.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' reports/frontend-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              STATUS="All Passed"
            else
              STATUS="$FAILURES failed, $ERRORS errors"
            fi

            echo "## Frontend Regression Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Frontend Regression Tests" >> $GITHUB_STEP_SUMMARY
            echo "Report not generated — tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Tear down frontend regression stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  backend-regressions:
    name: Backend Regressions
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Docker-backed backend regression suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend-regression-test backend-regression-test

      - name: Upload backend regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-regression-report
          path: reports/backend-regression-report.xml
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          if [ -f reports/backend-regression-report.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/backend-regression-report.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/backend-regression-report.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/backend-regression-report.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' reports/backend-regression-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              STATUS="All Passed"
            else
              STATUS="$FAILURES failed, $ERRORS errors"
            fi

            echo "## Backend Regression Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Backend Regression Tests" >> $GITHUB_STEP_SUMMARY
            echo "Report not generated — tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Tear down regression stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  backend-integration:
    name: Backend Integration
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Docker-backed backend integration suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend-test backend-test

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: reports/backend-report.xml
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          if [ -f reports/backend-report.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/backend-report.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/backend-report.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/backend-report.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' reports/backend-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              STATUS="All Passed"
            else
              STATUS="$FAILURES failed, $ERRORS errors"
            fi

            echo "## Backend Integration Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Backend Integration Tests" >> $GITHUB_STEP_SUMMARY
            echo "Report not generated — tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Tear down integration stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  test-report:
    name: Test Reports
    needs: [frontend-checks, backend-regressions, backend-integration, smoke-test]
    if: always() && github.event.inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all test reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: List downloaded reports
        if: always()
        run: |
          find reports -name '*.xml' | while read f; do
            echo "Found: $f"
            head -1 "$f"
          done

      - name: Frontend Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend Regressions (88 tests)
          path: reports/frontend-test-report/frontend-report.xml
          reporter: jest-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend Regression Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Regressions (9 tests)
          path: reports/backend-regression-report/backend-regression-report.xml
          reporter: java-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend Integration Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Integration (34 tests)
          path: reports/backend-test-report/backend-report.xml
          reporter: java-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Smoke Tests (1 test)
          path: reports/smoke-test-report/smoke-report.xml
          reporter: java-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t spendrax-backend:test ./backend

      - name: Build frontend image
        run: docker build -t spendrax-frontend:test ./frontend

  smoke-test:
    name: Smoke Test
    needs: [frontend-checks, backend-regressions, backend-integration, docker-build-check]
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.skip_tests != 'true' &&
      (needs.frontend-checks.result == 'success' || needs.frontend-checks.result == 'skipped') &&
      (needs.backend-regressions.result == 'success' || needs.backend-regressions.result == 'skipped') &&
      (needs.backend-integration.result == 'success' || needs.backend-integration.result == 'skipped') &&
      (needs.docker-build-check.result == 'success' || needs.docker-build-check.result == 'skipped')

    steps:
      - name: Checkout repository
        id: checkout_primary
        uses: actions/checkout@v6
        continue-on-error: true

      - name: Wait before checkout retry
        if: steps.checkout_primary.outcome == 'failure'
        run: sleep 15

      - name: Retry repository checkout
        id: checkout_retry
        if: steps.checkout_primary.outcome == 'failure'
        uses: actions/checkout@v6
        continue-on-error: true

      - name: Stop when repository checkout fails
        if: steps.checkout_primary.outcome != 'success' && steps.checkout_retry.outcome != 'success'
        run: |
          echo "GitHub checkout failed before smoke tests could start." >&2
          exit 1

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Docker-backed smoke suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from smoke-test smoke-test

      - name: Upload smoke test report
        if: always() && hashFiles('reports/smoke-report.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: reports/smoke-report.xml
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          if [ "${{ steps.checkout_primary.outcome }}" != "success" ] && [ "${{ steps.checkout_retry.outcome }}" != "success" ]; then
            echo "## Smoke Tests" >> $GITHUB_STEP_SUMMARY
            echo "Repository checkout failed before smoke tests could start. GitHub returned an error while fetching the workflow ref." >> $GITHUB_STEP_SUMMARY
          elif [ -f reports/smoke-report.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/smoke-report.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/smoke-report.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/smoke-report.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' reports/smoke-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              STATUS="All Passed"
            else
              STATUS="$FAILURES failed, $ERRORS errors"
            fi

            echo "## Smoke Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Smoke Tests" >> $GITHUB_STEP_SUMMARY
            echo "Report not generated — smoke tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Tear down smoke stack
        if: always() && hashFiles('docker-compose.test.yml') != ''
        run: docker compose -f docker-compose.test.yml down -v

  check-infrastructure:
    name: Check Infrastructure
    needs: [detect-changes, frontend-checks, backend-regressions, backend-integration, docker-build-check, smoke-test]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/test' ||
        github.ref == 'refs/heads/staging'
      ) &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_application == 'true') ||
        (github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.app_changed == 'true')
      ) &&
      (needs.frontend-checks.result == 'success' || needs.frontend-checks.result == 'skipped') &&
      (needs.backend-regressions.result == 'success' || needs.backend-regressions.result == 'skipped') &&
      (needs.backend-integration.result == 'success' || needs.backend-integration.result == 'skipped') &&
      (needs.docker-build-check.result == 'success' || needs.docker-build-check.result == 'skipped') &&
      (needs.smoke-test.result == 'success' || needs.smoke-test.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform backend and ECS outputs
        id: check
        run: |
          set +e
          terraform -chdir="${TF_WORKING_DIR}" init \
            -input=false \
            -reconfigure \
            -backend-config=backend.hcl >/tmp/terraform-init.log 2>&1
          INIT_STATUS=$?
          set -e

          if [ "${INIT_STATUS}" -ne 0 ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "## Deployment skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Terraform backend for \`${TERRAFORM_ENV}\` is not ready yet." >> "$GITHUB_STEP_SUMMARY"
            echo "Run the \`Terraform Apply\` workflow for \`${TERRAFORM_ENV}\` first." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          set +e
          APP_URL=$(terraform -chdir="${TF_WORKING_DIR}" output -raw app_url 2>/tmp/terraform-app-url.err)
          APP_URL_STATUS=$?
          ECS_CLUSTER_NAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw ecs_cluster_name 2>/tmp/terraform-ecs-cluster.err)
          ECS_CLUSTER_STATUS=$?
          FRONTEND_SERVICE_NAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw frontend_service_name 2>/tmp/terraform-frontend-service.err)
          FRONTEND_SERVICE_STATUS=$?
          BACKEND_SERVICE_NAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw backend_service_name 2>/tmp/terraform-backend-service.err)
          BACKEND_SERVICE_STATUS=$?
          FRONTEND_TASK_DEFINITION_ARN=$(terraform -chdir="${TF_WORKING_DIR}" output -raw frontend_task_definition_arn 2>/tmp/terraform-frontend-taskdef.err)
          FRONTEND_TASK_DEFINITION_STATUS=$?
          BACKEND_TASK_DEFINITION_ARN=$(terraform -chdir="${TF_WORKING_DIR}" output -raw backend_task_definition_arn 2>/tmp/terraform-backend-taskdef.err)
          BACKEND_TASK_DEFINITION_STATUS=$?
          FRONTEND_ECR_REPOSITORY_URL=$(terraform -chdir="${TF_WORKING_DIR}" output -raw frontend_ecr_repository_url 2>/tmp/terraform-frontend-ecr.err)
          FRONTEND_ECR_REPOSITORY_STATUS=$?
          BACKEND_ECR_REPOSITORY_URL=$(terraform -chdir="${TF_WORKING_DIR}" output -raw backend_ecr_repository_url 2>/tmp/terraform-backend-ecr.err)
          BACKEND_ECR_REPOSITORY_STATUS=$?
          BACKEND_RUNTIME_SECRET_ARN=$(terraform -chdir="${TF_WORKING_DIR}" output -raw backend_runtime_secret_arn 2>/tmp/terraform-backend-runtime-secret.err)
          BACKEND_RUNTIME_SECRET_STATUS=$?
          DOCUMENTDB_ENDPOINT=$(terraform -chdir="${TF_WORKING_DIR}" output -raw documentdb_endpoint 2>/tmp/terraform-documentdb-endpoint.err)
          DOCUMENTDB_ENDPOINT_STATUS=$?
          DOCUMENTDB_USERNAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw documentdb_username 2>/tmp/terraform-documentdb-username.err)
          DOCUMENTDB_USERNAME_STATUS=$?
          DATABASE_NAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw database_name 2>/tmp/terraform-database-name.err)
          DATABASE_NAME_STATUS=$?
          set -e

          if [ "${APP_URL_STATUS}" -ne 0 ] || [ "${ECS_CLUSTER_STATUS}" -ne 0 ] || [ "${FRONTEND_SERVICE_STATUS}" -ne 0 ] || [ "${BACKEND_SERVICE_STATUS}" -ne 0 ] || [ "${FRONTEND_TASK_DEFINITION_STATUS}" -ne 0 ] || [ "${BACKEND_TASK_DEFINITION_STATUS}" -ne 0 ] || [ "${FRONTEND_ECR_REPOSITORY_STATUS}" -ne 0 ] || [ "${BACKEND_ECR_REPOSITORY_STATUS}" -ne 0 ] || [ "${BACKEND_RUNTIME_SECRET_STATUS}" -ne 0 ] || [ "${DOCUMENTDB_ENDPOINT_STATUS}" -ne 0 ] || [ "${DOCUMENTDB_USERNAME_STATUS}" -ne 0 ] || [ "${DATABASE_NAME_STATUS}" -ne 0 ] || [ -z "${APP_URL}" ] || [ -z "${ECS_CLUSTER_NAME}" ] || [ -z "${FRONTEND_SERVICE_NAME}" ] || [ -z "${BACKEND_SERVICE_NAME}" ] || [ -z "${FRONTEND_TASK_DEFINITION_ARN}" ] || [ -z "${BACKEND_TASK_DEFINITION_ARN}" ] || [ -z "${FRONTEND_ECR_REPOSITORY_URL}" ] || [ -z "${BACKEND_ECR_REPOSITORY_URL}" ] || [ -z "${BACKEND_RUNTIME_SECRET_ARN}" ] || [ -z "${DOCUMENTDB_ENDPOINT}" ] || [ -z "${DOCUMENTDB_USERNAME}" ] || [ -z "${DATABASE_NAME}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "## Deployment skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Terraform state for \`${TERRAFORM_ENV}\` does not have the required ECS deployment outputs yet." >> "$GITHUB_STEP_SUMMARY"
            echo "Run the \`Terraform Apply\` workflow for \`${TERRAFORM_ENV}\` first." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          SERVICE_FAILURES=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${FRONTEND_SERVICE_NAME}" "${BACKEND_SERVICE_NAME}" \
            --region "${AWS_REGION}" \
            --query 'length(failures)' \
            --output text 2>/dev/null || echo "2")

          if [ "${SERVICE_FAILURES}" != "0" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "## Deployment skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "ECS services for \`${TERRAFORM_ENV}\` are not ready yet." >> "$GITHUB_STEP_SUMMARY"
            echo "Run the \`Terraform Apply\` workflow for \`${TERRAFORM_ENV}\` first." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "## Infrastructure check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "ECS infrastructure is available for \`${TERRAFORM_ENV}\`. Proceeding with image publish and service rollout." >> "$GITHUB_STEP_SUMMARY"

  deploy-application:
    name: Deploy Application
    needs: [detect-changes, frontend-checks, backend-regressions, backend-integration, docker-build-check, smoke-test, check-infrastructure]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/test' ||
        github.ref == 'refs/heads/staging'
      ) &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_application == 'true') ||
        (github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.app_changed == 'true')
      ) &&
      (needs.frontend-checks.result == 'success' || needs.frontend-checks.result == 'skipped') &&
      (needs.backend-regressions.result == 'success' || needs.backend-regressions.result == 'skipped') &&
      (needs.backend-integration.result == 'success' || needs.backend-integration.result == 'skipped') &&
      (needs.docker-build-check.result == 'success' || needs.docker-build-check.result == 'skipped') &&
      (needs.smoke-test.result == 'success' || needs.smoke-test.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'prod' && 'production' || github.event_name != 'workflow_dispatch' && github.ref_name == 'main' && 'production' || github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || github.ref_name == 'test' && 'test' || github.ref_name == 'staging' && 'staging' || 'production' }}

    steps:
      - uses: actions/checkout@v6

      - name: Note infrastructure precheck result
        if: needs.check-infrastructure.outputs.available != 'true'
        run: |
          echo "::warning::Infrastructure precheck did not confirm ECS availability. Continuing because deploy was requested and required checks passed. Deployment will fail with a clear error if Terraform outputs or ECS resources are missing."
          echo "## Infrastructure precheck warning" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The deployment job is continuing because the required checks passed and deployment was requested." >> "$GITHUB_STEP_SUMMARY"
          echo "If Terraform outputs or ECS resources are missing, this job will fail during deployment output loading or ECS rollout." >> "$GITHUB_STEP_SUMMARY"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Terraform init
        run: |
          terraform -chdir="${TF_WORKING_DIR}" init \
            -input=false \
            -reconfigure \
            -backend-config=backend.hcl

      - name: Read deployment outputs
        run: |
          APP_URL=$(terraform -chdir="${TF_WORKING_DIR}" output -raw app_url)
          ECS_CLUSTER_NAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw ecs_cluster_name)
          FRONTEND_SERVICE_NAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw frontend_service_name)
          BACKEND_SERVICE_NAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw backend_service_name)
          FRONTEND_TASK_DEFINITION_ARN=$(terraform -chdir="${TF_WORKING_DIR}" output -raw frontend_task_definition_arn)
          BACKEND_TASK_DEFINITION_ARN=$(terraform -chdir="${TF_WORKING_DIR}" output -raw backend_task_definition_arn)
          FRONTEND_ECR_REPOSITORY_URL=$(terraform -chdir="${TF_WORKING_DIR}" output -raw frontend_ecr_repository_url)
          BACKEND_ECR_REPOSITORY_URL=$(terraform -chdir="${TF_WORKING_DIR}" output -raw backend_ecr_repository_url)
          BACKEND_RUNTIME_SECRET_ARN=$(terraform -chdir="${TF_WORKING_DIR}" output -raw backend_runtime_secret_arn)
          DOCUMENTDB_ENDPOINT=$(terraform -chdir="${TF_WORKING_DIR}" output -raw documentdb_endpoint)
          DOCUMENTDB_USERNAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw documentdb_username)
          DATABASE_NAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw database_name)

          echo "APP_URL=${APP_URL}" >> "$GITHUB_ENV"
          echo "ECS_CLUSTER_NAME=${ECS_CLUSTER_NAME}" >> "$GITHUB_ENV"
          echo "FRONTEND_SERVICE_NAME=${FRONTEND_SERVICE_NAME}" >> "$GITHUB_ENV"
          echo "BACKEND_SERVICE_NAME=${BACKEND_SERVICE_NAME}" >> "$GITHUB_ENV"
          echo "FRONTEND_TASK_DEFINITION_ARN=${FRONTEND_TASK_DEFINITION_ARN}" >> "$GITHUB_ENV"
          echo "BACKEND_TASK_DEFINITION_ARN=${BACKEND_TASK_DEFINITION_ARN}" >> "$GITHUB_ENV"
          echo "FRONTEND_ECR_REPOSITORY_URL=${FRONTEND_ECR_REPOSITORY_URL}" >> "$GITHUB_ENV"
          echo "BACKEND_ECR_REPOSITORY_URL=${BACKEND_ECR_REPOSITORY_URL}" >> "$GITHUB_ENV"
          echo "BACKEND_RUNTIME_SECRET_ARN=${BACKEND_RUNTIME_SECRET_ARN}" >> "$GITHUB_ENV"
          echo "DOCUMENTDB_ENDPOINT=${DOCUMENTDB_ENDPOINT}" >> "$GITHUB_ENV"
          echo "DOCUMENTDB_USERNAME=${DOCUMENTDB_USERNAME}" >> "$GITHUB_ENV"
          echo "DATABASE_NAME=${DATABASE_NAME}" >> "$GITHUB_ENV"

      - name: Prepare release metadata
        run: |
          IMAGE_TAG="${GITHUB_SHA::12}-${GITHUB_RUN_ID}"
          RELEASE_ID="${GITHUB_SHA::7}-${GITHUB_RUN_ID}"

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_ID=${RELEASE_ID}" >> "$GITHUB_ENV"

      - name: Build backend image
        run: |
          docker build \
            -t "${BACKEND_ECR_REPOSITORY_URL}:${IMAGE_TAG}" \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg REACT_APP_BACKEND_URL= \
            -t "${FRONTEND_ECR_REPOSITORY_URL}:${IMAGE_TAG}" \
            ./frontend

      - name: Push backend image to ECR
        run: docker push "${BACKEND_ECR_REPOSITORY_URL}:${IMAGE_TAG}"

      - name: Push frontend image to ECR
        run: docker push "${FRONTEND_ECR_REPOSITORY_URL}:${IMAGE_TAG}"

      - name: Sync backend runtime secret
        env:
          DOCUMENTDB_PASSWORD_INPUT: ${{ secrets.TF_VAR_DOCUMENTDB_PASSWORD || secrets.DOCUMENTDB_PASSWORD }}
          JWT_SECRET_KEY_INPUT: ${{ secrets.TF_VAR_JWT_SECRET_KEY || secrets.JWT_SECRET_KEY }}
          OPENAI_API_KEY_INPUT: ${{ secrets.TF_VAR_OPENAI_API_KEY || secrets.OPENAI_API_KEY }}
          SMTP_USER_INPUT: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD_INPUT: ${{ secrets.SMTP_PASSWORD }}
        run: |
          EXISTING_SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "${BACKEND_RUNTIME_SECRET_ARN}" \
            --region "${AWS_REGION}" \
            --query 'SecretString' \
            --output text 2>/dev/null || echo '{}')

          if [ -z "${EXISTING_SECRET_JSON}" ] || [ "${EXISTING_SECRET_JSON}" = "None" ]; then
            EXISTING_SECRET_JSON='{}'
          fi

          existing_secret_value() {
            jq -r --arg key "$1" '.[$key] // empty' <<<"${EXISTING_SECRET_JSON}"
          }

          EXISTING_MONGO_URL=$(existing_secret_value "MONGO_URL")
          EXISTING_JWT_SECRET_KEY=$(existing_secret_value "JWT_SECRET_KEY")
          EXISTING_OPENAI_API_KEY=$(existing_secret_value "OPENAI_API_KEY")
          EXISTING_SMTP_USER=$(existing_secret_value "SMTP_USER")
          EXISTING_SMTP_PASSWORD=$(existing_secret_value "SMTP_PASSWORD")

          if [ -n "${DOCUMENTDB_PASSWORD_INPUT}" ]; then
            MONGO_URL="mongodb://${DOCUMENTDB_USERNAME}:${DOCUMENTDB_PASSWORD_INPUT}@${DOCUMENTDB_ENDPOINT}:27017/${DATABASE_NAME}?tls=false&retryWrites=false&directConnection=true"
          else
            MONGO_URL="${EXISTING_MONGO_URL}"
          fi

          if [ -n "${JWT_SECRET_KEY_INPUT}" ]; then
            JWT_SECRET_KEY_VALUE="${JWT_SECRET_KEY_INPUT}"
          else
            JWT_SECRET_KEY_VALUE="${EXISTING_JWT_SECRET_KEY}"
          fi

          if [ -n "${OPENAI_API_KEY_INPUT}" ]; then
            OPENAI_API_KEY_VALUE="${OPENAI_API_KEY_INPUT}"
          else
            OPENAI_API_KEY_VALUE="${EXISTING_OPENAI_API_KEY}"
          fi

          if [ -n "${SMTP_USER_INPUT}" ]; then
            SMTP_USER_VALUE="${SMTP_USER_INPUT}"
          else
            SMTP_USER_VALUE="${EXISTING_SMTP_USER}"
          fi

          if [ -n "${SMTP_PASSWORD_INPUT}" ]; then
            SMTP_PASSWORD_VALUE="${SMTP_PASSWORD_INPUT}"
          else
            SMTP_PASSWORD_VALUE="${EXISTING_SMTP_PASSWORD}"
          fi

          if [ -z "${MONGO_URL}" ]; then
            echo "DocumentDB runtime secret is missing. Provide DOCUMENTDB_PASSWORD in GitHub secrets once, or seed MONGO_URL in Secrets Manager."
            exit 1
          fi

          if [ -z "${JWT_SECRET_KEY_VALUE}" ]; then
            echo "JWT runtime secret is missing. Provide JWT_SECRET_KEY in GitHub secrets once, or seed it directly in Secrets Manager."
            exit 1
          fi

          SECRET_STRING=$(jq -n \
            --arg mongo_url "${MONGO_URL}" \
            --arg jwt_secret_key "${JWT_SECRET_KEY_VALUE}" \
            --arg openai_api_key "${OPENAI_API_KEY_VALUE}" \
            --arg smtp_user "${SMTP_USER_VALUE}" \
            --arg smtp_password "${SMTP_PASSWORD_VALUE}" \
            '{
              MONGO_URL: $mongo_url,
              JWT_SECRET_KEY: $jwt_secret_key,
              OPENAI_API_KEY: $openai_api_key,
              SMTP_USER: $smtp_user,
              SMTP_PASSWORD: $smtp_password
            }')

          aws secretsmanager put-secret-value \
            --secret-id "${BACKEND_RUNTIME_SECRET_ARN}" \
            --secret-string "${SECRET_STRING}" \
            --region "${AWS_REGION}" >/dev/null

      - name: Resolve desired ECS service counts
        run: |
          if [ "${TERRAFORM_ENV}" = "prod" ]; then
            DEFAULT_DESIRED_COUNT=2
          else
            DEFAULT_DESIRED_COUNT=1
          fi

          CURRENT_FRONTEND_DESIRED=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${FRONTEND_SERVICE_NAME}" \
            --region "${AWS_REGION}" \
            --query 'services[0].desiredCount' \
            --output text)

          CURRENT_BACKEND_DESIRED=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${BACKEND_SERVICE_NAME}" \
            --region "${AWS_REGION}" \
            --query 'services[0].desiredCount' \
            --output text)

          if [ -z "${CURRENT_FRONTEND_DESIRED}" ] || [ "${CURRENT_FRONTEND_DESIRED}" = "None" ] || [ "${CURRENT_FRONTEND_DESIRED}" = "0" ]; then
            FRONTEND_DESIRED_COUNT="${DEFAULT_DESIRED_COUNT}"
          else
            FRONTEND_DESIRED_COUNT="${CURRENT_FRONTEND_DESIRED}"
          fi

          if [ -z "${CURRENT_BACKEND_DESIRED}" ] || [ "${CURRENT_BACKEND_DESIRED}" = "None" ] || [ "${CURRENT_BACKEND_DESIRED}" = "0" ]; then
            BACKEND_DESIRED_COUNT="${DEFAULT_DESIRED_COUNT}"
          else
            BACKEND_DESIRED_COUNT="${CURRENT_BACKEND_DESIRED}"
          fi

          echo "FRONTEND_DESIRED_COUNT=${FRONTEND_DESIRED_COUNT}" >> "$GITHUB_ENV"
          echo "BACKEND_DESIRED_COUNT=${BACKEND_DESIRED_COUNT}" >> "$GITHUB_ENV"

      - name: Register frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${FRONTEND_TASK_DEFINITION_ARN}" \
            --region "${AWS_REGION}" \
            --query 'taskDefinition' \
            --output json > frontend-task-definition.json

          jq --arg image "${FRONTEND_ECR_REPOSITORY_URL}:${IMAGE_TAG}" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions = (.containerDefinitions | map(
                if .name == "frontend" then .image = $image else . end
              ))
          ' frontend-task-definition.json > frontend-task-definition-register.json

          FRONTEND_DEPLOY_TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://frontend-task-definition-register.json \
            --region "${AWS_REGION}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "FRONTEND_DEPLOY_TASK_DEFINITION_ARN=${FRONTEND_DEPLOY_TASK_DEFINITION_ARN}" >> "$GITHUB_ENV"

      - name: Register backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${BACKEND_TASK_DEFINITION_ARN}" \
            --region "${AWS_REGION}" \
            --query 'taskDefinition' \
            --output json > backend-task-definition.json

          jq --arg image "${BACKEND_ECR_REPOSITORY_URL}:${IMAGE_TAG}" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions = (.containerDefinitions | map(
                if .name == "backend" then .image = $image else . end
              ))
          ' backend-task-definition.json > backend-task-definition-register.json

          BACKEND_DEPLOY_TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://backend-task-definition-register.json \
            --region "${AWS_REGION}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "BACKEND_DEPLOY_TASK_DEFINITION_ARN=${BACKEND_DEPLOY_TASK_DEFINITION_ARN}" >> "$GITHUB_ENV"

      - name: Update ECS services
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${FRONTEND_SERVICE_NAME}" \
            --task-definition "${FRONTEND_DEPLOY_TASK_DEFINITION_ARN}" \
            --desired-count "${FRONTEND_DESIRED_COUNT}" \
            --region "${AWS_REGION}"

          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${BACKEND_SERVICE_NAME}" \
            --task-definition "${BACKEND_DEPLOY_TASK_DEFINITION_ARN}" \
            --desired-count "${BACKEND_DESIRED_COUNT}" \
            --region "${AWS_REGION}"

      - name: Wait for ECS services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${FRONTEND_SERVICE_NAME}" "${BACKEND_SERVICE_NAME}" \
            --region "${AWS_REGION}"

      - name: Verify deployed application health
        run: |
          ROOT_URL="${APP_URL}"
          API_HEALTH_URL="${APP_URL}/api/health"

          for attempt in $(seq 1 18); do
            ROOT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${ROOT_URL}" || true)
            HEALTH_BODY=$(curl -fsS "${API_HEALTH_URL}" || true)

            if [ "${ROOT_STATUS}" = "200" ] && echo "${HEALTH_BODY}" | grep -q '"status":"healthy"'; then
              echo "Deployment health checks passed"
              exit 0
            fi

            echo "Health check attempt ${attempt}/18 did not pass yet"
            sleep 10
          done

          echo "Deployment health verification failed"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${GITHUB_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release | ${RELEASE_ID} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${TERRAFORM_ENV} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ECS Cluster | ${ECS_CLUSTER_NAME} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend Service | ${FRONTEND_SERVICE_NAME} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend Service | ${BACKEND_SERVICE_NAME} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Tag | ${IMAGE_TAG} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App URL | ${APP_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
