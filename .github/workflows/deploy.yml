name: CI/CD Pipeline

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy)'
        required: false
        default: 'false'
        type: boolean

env:
  APP_DIR: /opt/spendrax
  DOCKER_COMPOSE_FILE: docker-compose.prod.yml

jobs:
  # ============================================
  # BUILD & TEST
  # ============================================
  frontend-checks:
    name: Frontend Regressions
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Docker-backed frontend regression suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from frontend-regression-test frontend-regression-test

      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: reports/frontend-report.xml
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          if [ -f reports/frontend-report.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/frontend-report.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/frontend-report.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/frontend-report.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' reports/frontend-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              STATUS="All Passed"
            else
              STATUS="$FAILURES failed, $ERRORS errors"
            fi

            echo "## Frontend Regression Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Frontend Regression Tests" >> $GITHUB_STEP_SUMMARY
            echo "Report not generated — tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Tear down frontend regression stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  backend-regressions:
    name: Backend Regressions
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Docker-backed backend regression suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend-regression-test backend-regression-test

      - name: Upload backend regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-regression-report
          path: reports/backend-regression-report.xml
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          if [ -f reports/backend-regression-report.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/backend-regression-report.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/backend-regression-report.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/backend-regression-report.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' reports/backend-regression-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              STATUS="All Passed"
            else
              STATUS="$FAILURES failed, $ERRORS errors"
            fi

            echo "## Backend Regression Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Backend Regression Tests" >> $GITHUB_STEP_SUMMARY
            echo "Report not generated — tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Tear down regression stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  backend-integration:
    name: Backend Integration
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Docker-backed backend integration suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend-test backend-test

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: reports/backend-report.xml
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          if [ -f reports/backend-report.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/backend-report.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/backend-report.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/backend-report.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' reports/backend-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              STATUS="All Passed"
            else
              STATUS="$FAILURES failed, $ERRORS errors"
            fi

            echo "## Backend Integration Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Backend Integration Tests" >> $GITHUB_STEP_SUMMARY
            echo "Report not generated — tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Tear down integration stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ============================================
  # TEST REPORTS (Checks tab with per-test details)
  # ============================================
  test-report:
    name: Test Reports
    needs: [frontend-checks, backend-regressions, backend-integration]
    if: always() && github.event.inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all test reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: List downloaded reports
        if: always()
        run: find reports -name '*.xml' -exec echo "Found: {}" \; -exec head -1 {} \;

      - name: Frontend Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend Regressions (84 tests)
          path: reports/frontend-test-report/frontend-report.xml
          reporter: jest-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend Regression Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Regressions (9 tests)
          path: reports/backend-regression-report/backend-regression-report.xml
          reporter: java-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend Integration Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Integration (34 tests)
          path: reports/backend-test-report/backend-report.xml
          reporter: java-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t spendrax-backend:test ./backend

      - name: Build frontend image
        run: docker build -t spendrax-frontend:test ./frontend

