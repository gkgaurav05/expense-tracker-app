name: CI/CD Pipeline

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip tests (emergency use only)
        required: false
        default: "false"
        type: boolean
      deploy_application:
        description: Deploy the application bundle to EC2
        required: false
        default: "true"
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TERRAFORM_ENV: ${{ vars.TERRAFORM_ENV || (github.ref_name == 'test' && 'test' || 'prod') }}
  TF_WORKING_DIR: infrastructure/terraform/envs/${{ vars.TERRAFORM_ENV || (github.ref_name == 'test' && 'test' || 'prod') }}
  TF_VAR_project_name: ${{ vars.TF_VAR_PROJECT_NAME || 'spendrax' }}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.filter.outputs.infrastructure }}
      app_changed: ${{ steps.filter.outputs.application }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect infrastructure and application changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infrastructure:
              - 'infrastructure/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'
            application:
              - 'backend/**'
              - 'frontend/**'
              - 'docker-compose.prod.yml'
              - 'infrastructure/scripts/deploy.sh'

  frontend-checks:
    name: Frontend Regressions
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Docker-backed frontend regression suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from frontend-regression-test frontend-regression-test

      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: reports/frontend-report.xml
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          if [ -f reports/frontend-report.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/frontend-report.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/frontend-report.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/frontend-report.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' reports/frontend-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              STATUS="All Passed"
            else
              STATUS="$FAILURES failed, $ERRORS errors"
            fi

            echo "## Frontend Regression Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Frontend Regression Tests" >> $GITHUB_STEP_SUMMARY
            echo "Report not generated — tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Tear down frontend regression stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  backend-regressions:
    name: Backend Regressions
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Docker-backed backend regression suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend-regression-test backend-regression-test

      - name: Upload backend regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-regression-report
          path: reports/backend-regression-report.xml
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          if [ -f reports/backend-regression-report.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/backend-regression-report.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/backend-regression-report.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/backend-regression-report.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' reports/backend-regression-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              STATUS="All Passed"
            else
              STATUS="$FAILURES failed, $ERRORS errors"
            fi

            echo "## Backend Regression Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Backend Regression Tests" >> $GITHUB_STEP_SUMMARY
            echo "Report not generated — tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Tear down regression stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  backend-integration:
    name: Backend Integration
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Docker-backed backend integration suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend-test backend-test

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: reports/backend-report.xml
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          if [ -f reports/backend-report.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/backend-report.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/backend-report.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/backend-report.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' reports/backend-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              STATUS="All Passed"
            else
              STATUS="$FAILURES failed, $ERRORS errors"
            fi

            echo "## Backend Integration Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Backend Integration Tests" >> $GITHUB_STEP_SUMMARY
            echo "Report not generated — tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Tear down integration stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  test-report:
    name: Test Reports
    needs: [frontend-checks, backend-regressions, backend-integration, smoke-test]
    if: always() && github.event.inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all test reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: List downloaded reports
        if: always()
        run: |
          find reports -name '*.xml' | while read f; do
            echo "Found: $f"
            head -1 "$f"
          done

      - name: Frontend Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend Regressions (88 tests)
          path: reports/frontend-test-report/frontend-report.xml
          reporter: jest-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend Regression Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Regressions (9 tests)
          path: reports/backend-regression-report/backend-regression-report.xml
          reporter: java-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend Integration Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Integration (34 tests)
          path: reports/backend-test-report/backend-report.xml
          reporter: java-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Smoke Tests (1 test)
          path: reports/smoke-test-report/smoke-report.xml
          reporter: java-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t spendrax-backend:test ./backend

      - name: Build frontend image
        run: docker build -t spendrax-frontend:test ./frontend

  smoke-test:
    name: Smoke Test
    needs: [frontend-checks, backend-regressions, backend-integration, docker-build-check]
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.skip_tests != 'true' &&
      (needs.frontend-checks.result == 'success' || needs.frontend-checks.result == 'skipped') &&
      (needs.backend-regressions.result == 'success' || needs.backend-regressions.result == 'skipped') &&
      (needs.backend-integration.result == 'success' || needs.backend-integration.result == 'skipped') &&
      (needs.docker-build-check.result == 'success' || needs.docker-build-check.result == 'skipped')

    steps:
      - uses: actions/checkout@v6

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Docker-backed smoke suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from smoke-test smoke-test

      - name: Upload smoke test report
        if: always() && hashFiles('reports/smoke-report.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: reports/smoke-report.xml
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          if [ -f reports/smoke-report.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/smoke-report.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/smoke-report.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/smoke-report.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' reports/smoke-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              STATUS="All Passed"
            else
              STATUS="$FAILURES failed, $ERRORS errors"
            fi

            echo "## Smoke Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Smoke Tests" >> $GITHUB_STEP_SUMMARY
            echo "Report not generated — smoke tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Tear down smoke stack
        if: always() && hashFiles('docker-compose.test.yml') != ''
        run: docker compose -f docker-compose.test.yml down -v

  check-infrastructure:
    name: Check Infrastructure
    needs: [detect-changes, frontend-checks, backend-regressions, backend-integration, docker-build-check, smoke-test]
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test') &&
      (
        needs.detect-changes.outputs.app_changed == 'true' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_application == 'true')
      ) &&
      (needs.frontend-checks.result == 'success' || needs.frontend-checks.result == 'skipped') &&
      (needs.backend-regressions.result == 'success' || needs.backend-regressions.result == 'skipped') &&
      (needs.backend-integration.result == 'success' || needs.backend-integration.result == 'skipped') &&
      (needs.docker-build-check.result == 'success' || needs.docker-build-check.result == 'skipped') &&
      (needs.smoke-test.result == 'success' || needs.smoke-test.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare Terraform backend config
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_BUCKET="${TF_VAR_project_name}-terraform-state-${ACCOUNT_ID}"
          LOCK_TABLE="${TF_VAR_project_name}-terraform-locks"
          BACKEND_CONFIG_PATH="${RUNNER_TEMP}/terraform-backend-${TERRAFORM_ENV}.hcl"

          cat > "${BACKEND_CONFIG_PATH}" <<EOF
          bucket         = "${STATE_BUCKET}"
          key            = "${TERRAFORM_ENV}/terraform.tfstate"
          region         = "${AWS_REGION}"
          encrypt        = true
          dynamodb_table = "${LOCK_TABLE}"
          EOF

          echo "TF_BACKEND_CONFIG_PATH=${BACKEND_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Check Terraform backend and outputs
        id: check
        run: |
          set +e
          terraform -chdir="${TF_WORKING_DIR}" init \
            -input=false \
            -reconfigure \
            -backend-config="${TF_BACKEND_CONFIG_PATH}" >/tmp/terraform-init.log 2>&1
          INIT_STATUS=$?
          set -e

          if [ "${INIT_STATUS}" -ne 0 ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "## Deployment skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Terraform backend for \`${TERRAFORM_ENV}\` is not ready yet." >> "$GITHUB_STEP_SUMMARY"
            echo "Run the \`Terraform Apply\` workflow for \`${TERRAFORM_ENV}\` first." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          set +e
          INSTANCE_ID=$(terraform -chdir="${TF_WORKING_DIR}" output -raw instance_id 2>/tmp/terraform-instance-id.err)
          INSTANCE_STATUS=$?
          ARTIFACT_BUCKET=$(terraform -chdir="${TF_WORKING_DIR}" output -raw deployment_artifacts_bucket 2>/tmp/terraform-artifact-bucket.err)
          ARTIFACT_STATUS=$?
          APP_URL=$(terraform -chdir="${TF_WORKING_DIR}" output -raw app_url 2>/tmp/terraform-app-url.err)
          APP_URL_STATUS=$?
          set -e

          if [ "${INSTANCE_STATUS}" -ne 0 ] || [ "${ARTIFACT_STATUS}" -ne 0 ] || [ "${APP_URL_STATUS}" -ne 0 ] || [ -z "${INSTANCE_ID}" ] || [ -z "${ARTIFACT_BUCKET}" ] || [ -z "${APP_URL}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "## Deployment skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Terraform state for \`${TERRAFORM_ENV}\` does not have the required deployment outputs yet." >> "$GITHUB_STEP_SUMMARY"
            echo "Run the \`Terraform Apply\` workflow for \`${TERRAFORM_ENV}\` first." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "## Infrastructure check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Infrastructure is available for \`${TERRAFORM_ENV}\`. Proceeding with application deployment." >> "$GITHUB_STEP_SUMMARY"

  deploy-application:
    name: Deploy Application
    needs: [detect-changes, frontend-checks, backend-regressions, backend-integration, docker-build-check, smoke-test, check-infrastructure]
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test') &&
      (
        needs.detect-changes.outputs.app_changed == 'true' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_application == 'true')
      ) &&
      (needs.frontend-checks.result == 'success' || needs.frontend-checks.result == 'skipped') &&
      (needs.backend-regressions.result == 'success' || needs.backend-regressions.result == 'skipped') &&
      (needs.backend-integration.result == 'success' || needs.backend-integration.result == 'skipped') &&
      (needs.docker-build-check.result == 'success' || needs.docker-build-check.result == 'skipped') &&
      (needs.smoke-test.result == 'success' || needs.smoke-test.result == 'skipped') &&
      needs.check-infrastructure.outputs.available == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'test' && 'test' || 'production' }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare Terraform backend config
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_BUCKET="${TF_VAR_project_name}-terraform-state-${ACCOUNT_ID}"
          LOCK_TABLE="${TF_VAR_project_name}-terraform-locks"
          BACKEND_CONFIG_PATH="${RUNNER_TEMP}/terraform-backend-${TERRAFORM_ENV}.hcl"

          cat > "${BACKEND_CONFIG_PATH}" <<EOF
          bucket         = "${STATE_BUCKET}"
          key            = "${TERRAFORM_ENV}/terraform.tfstate"
          region         = "${AWS_REGION}"
          encrypt        = true
          dynamodb_table = "${LOCK_TABLE}"
          EOF

          echo "TF_BACKEND_CONFIG_PATH=${BACKEND_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Terraform init
        run: |
          terraform -chdir="${TF_WORKING_DIR}" init \
            -input=false \
            -reconfigure \
            -backend-config="${TF_BACKEND_CONFIG_PATH}"

      - name: Read deployment outputs
        run: |
          INSTANCE_ID=$(terraform -chdir="${TF_WORKING_DIR}" output -raw instance_id)
          ARTIFACT_BUCKET=$(terraform -chdir="${TF_WORKING_DIR}" output -raw deployment_artifacts_bucket)
          APP_URL=$(terraform -chdir="${TF_WORKING_DIR}" output -raw app_url)

          echo "INSTANCE_ID=${INSTANCE_ID}" >> "$GITHUB_ENV"
          echo "ARTIFACT_BUCKET=${ARTIFACT_BUCKET}" >> "$GITHUB_ENV"
          echo "APP_URL=${APP_URL}" >> "$GITHUB_ENV"

      - name: Wait for EC2 status checks
        run: aws ec2 wait instance-status-ok --instance-ids "${INSTANCE_ID}" --region "${AWS_REGION}"

      - name: Wait for SSM connectivity
        run: |
          for attempt in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --region "${AWS_REGION}" \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)

            if [ "${STATUS}" = "Online" ]; then
              echo "SSM is online for ${INSTANCE_ID}"
              exit 0
            fi

            echo "Waiting for SSM agent to come online (attempt ${attempt}/30)"
            sleep 10
          done

          echo "Timed out waiting for SSM connectivity on ${INSTANCE_ID}"
          exit 1

      - name: Create release bundle
        run: git archive --format=tar.gz --output=app-release.tar.gz "${GITHUB_SHA}"

      - name: Upload release bundle to S3
        run: |
          RELEASE_KEY="releases/${GITHUB_SHA}-${GITHUB_RUN_ID}.tar.gz"
          RELEASE_ID="${GITHUB_SHA::7}-${GITHUB_RUN_ID}"

          aws s3 cp app-release.tar.gz "s3://${ARTIFACT_BUCKET}/${RELEASE_KEY}"

          echo "RELEASE_KEY=${RELEASE_KEY}" >> "$GITHUB_ENV"
          echo "RELEASE_ID=${RELEASE_ID}" >> "$GITHUB_ENV"

      - name: Deploy application via SSM
        run: ./infrastructure/scripts/deploy.sh "${INSTANCE_ID}" "${ARTIFACT_BUCKET}" "${RELEASE_KEY}" "${RELEASE_ID}" "${AWS_REGION}"

      - name: Verify deployed application health
        run: |
          ROOT_URL="${APP_URL}"
          API_HEALTH_URL="${APP_URL}/api/health"

          for attempt in $(seq 1 10); do
            ROOT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${ROOT_URL}" || true)
            HEALTH_BODY=$(curl -fsS "${API_HEALTH_URL}" || true)

            if [ "${ROOT_STATUS}" = "200" ] && echo "${HEALTH_BODY}" | grep -q '"status":"healthy"'; then
              echo "Deployment health checks passed"
              exit 0
            fi

            echo "Health check attempt ${attempt}/10 did not pass yet"
            sleep 10
          done

          echo "Deployment health verification failed"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${GITHUB_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release | ${RELEASE_ID} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Instance ID | ${INSTANCE_ID} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact bucket | ${ARTIFACT_BUCKET} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App URL | ${APP_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
