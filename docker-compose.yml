version: "3.8"

services:
  # ── MongoDB ────────────────────────────────
  mongo:
    image: mongo:7
    container_name: spendrax-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────
  backend:
    build: ./backend
    container_name: spendrax-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=spendrax_db
    depends_on:
      mongo:
        condition: service_healthy

  # ── Frontend (React + Nginx) ───────────────
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ""
    container_name: spendrax-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
    driver: local
