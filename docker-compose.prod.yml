version: '3.8'

# Production Docker Compose for AWS EC2 deployment
# Uses AWS DocumentDB (MongoDB-compatible) - connection string from environment

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spendrax-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME:-spendrax_db}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-}
    container_name: spendrax-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: spendrax-network
